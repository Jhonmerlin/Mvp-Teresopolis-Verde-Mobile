<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>Admin Trilhas</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: #f4f6f9;
    }

    .card {
      border-radius: 16px;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .card:hover {
      transform: scale(1.02);
      box-shadow: 0 8px 20px rgba(0,0,0,0.1);
    }

    .btn {
      border-radius: 12px;
      transition: all 0.2s ease;
    }

    .btn:active {
      transform: scale(0.96);
    }

    .fade-in {
      animation: fadeIn 0.4s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .navbar {
      border-bottom-left-radius: 16px;
      border-bottom-right-radius: 16px;
    }
  </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar bg-success text-white p-3 justify-content-center shadow-sm">
  <strong>🌿 Painel Admin</strong>
</nav>

<div class="container py-3">

  <!-- FORM -->
  <div class="card p-3 mb-4 shadow-sm fade-in">

    <h5 class="mb-3">Novo Item</h5>
    <select id="tipo" class="form-select mb-2">
    <option value="trilha">🌲 Trilha</option>
    <option value="cachoeira">💧 Cachoeira</option>
    <option value="evento">🎉 Evento</option>
    </select>

    <input id="nome" class="form-control mb-2" placeholder="Nome da trilha">

    <input id="descricao" class="form-control mb-2" placeholder="Descrição">

    <input id="img" class="form-control mb-2" placeholder="URL da imagem">

    <div class="card p-3 mb-3">

    <h6>📅 Adicionar Datas</h6>
    <input type="date" id="dataInput" class="form-control mb-2">
    <button class="btn btn-outline-success w-100 mb-2" onclick="addData()">Adicionar Data</button>

    <div id="listaDatas" class="mb-3"></div>

    <h6>⏰ Adicionar Horários</h6>
    <input type="time" id="horaInput" class="form-control mb-2">
    <button class="btn btn-outline-success w-100 mb-2" onclick="addHora()">Adicionar Horário</button>

  <div id="listaHorarios"></div>

</div>

    <button class="btn btn-success w-100" onclick="add()">
      ➕ Adicionar Item
    </button>

  </div>

  <!-- LISTA -->
  <div id="lista"></div>

</div>

<script>
const tipo = localStorage.getItem('tipo');

if(!tipo){
  alert('Faça login primeiro');
  window.location.href='index.html';
}

if(tipo !== 'admin'){
  alert('Acesso negado');
  window.location.href='home.html';
}


// =====================
// 🔄 CARREGAR TRILHAS
// =====================
async function carregar(){
  try {
    const tipoSelecionado = document.getElementById('tipo').value;

    const resp = await fetch(`/itens?tipo=${tipoSelecionado}`);
    const trilhas = await resp.json();

    const lista = document.getElementById('lista');
    lista.innerHTML = '';

    trilhas.forEach(t => {
      lista.innerHTML += `
      <div class="card p-3 mb-3 fade-in">

        <img src="${t.img || 'https://via.placeholder.com/300'}"
             style="width:100%; height:180px; object-fit:cover; border-radius:12px;">

        <h5 class="mt-2">
          ${t.nome}
          <span class="badge bg-secondary">${t.tipo}</span>
        </h5>

        <p class="text-muted">${t.descricao || 'Sem descrição'}</p>

        <small>📅 ${t.datas?.join(', ') || 'Sem datas'}</small><br>
        <small>⏰ ${t.horarios?.join(', ') || 'Sem horários'}</small>

        <button class="btn btn-danger mt-2"
          onclick="remover('${t._id}')">
          🗑 Remover
        </button>

      </div>`;
    });

  } catch (err) {
    console.error(err);
    alert("Erro ao carregar itens");
  }
}

// =====================
// ➕ ADICIONAR
// =====================
async function add(){
  try {
    const nome = document.getElementById('nome').value;
    const descricao = document.getElementById('descricao').value;
    const img = document.getElementById('img').value;
    if(!nome){
      alert("Digite o nome");
      return;
    }

    const tipoSelecionado = document.getElementById('tipo').value;

    await fetch('/itens', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
    nome,
    descricao,
    img,
    tipo: tipoSelecionado,
    datas: datas || [],
    horarios: horarios || []
  })
});

    // limpar campos
    document.getElementById('nome').value = '';
    document.getElementById('descricao').value = '';
    document.getElementById('img').value = '';

    datas = [];
    horarios = [];

    renderDatas();
    renderHorarios();

    carregar();

  } catch (err) {
    console.error(err);
    alert("Erro ao adicionar");
  }
}


// =====================
// ❌ REMOVER
// =====================
async function remover(id){
  if(!confirm("Remover Item?")) return;

  try {
    await fetch(`/itens/${id}`, {
      method: 'DELETE'
    });

    carregar();

  } catch (err) {
    console.error(err);
    alert("Erro ao remover");
  }
}

let datas = [];
let horarios = [];


// =====================
// 📅 ADD DATA
// =====================
function addData(){
  const input = document.getElementById('dataInput');
  const valor = input.value;

  if(!valor){
    alert("Selecione uma data");
    return;
  }

  if(!datas.includes(valor)){
    datas.push(valor);
    renderDatas();
  }

  input.value = '';
}


// =====================
// ⏰ ADD HORA
// =====================
function addHora(){
  const input = document.getElementById('horaInput');
  const valor = input.value;

  if(!valor){
    alert("Selecione um horário");
    return;
  }

  if(!horarios.includes(valor)){
    horarios.push(valor);
    renderHorarios();
  }

  input.value = '';
}


// =====================
// 🎨 RENDER DATAS
// =====================
function renderDatas(){
  const div = document.getElementById('listaDatas');
  div.innerHTML = '';

  datas.forEach((d, i) => {
    div.innerHTML += `
      <span class="badge bg-success m-1">
        ${d}
      </span>
    `;
  });
}

function renderHorarios(){
  const div = document.getElementById('listaHorarios');
  div.innerHTML = '';

  horarios.forEach((h, i) => {
    div.innerHTML += `
      <span class="badge bg-primary m-1">
        ${h}
        <span onclick="removerHora(${i})" style="cursor:pointer;">❌</span>
      </span>
    `;
  });
}




// INIT
document.addEventListener('DOMContentLoaded', () => {
  carregar();

  const tipoSelect = document.getElementById('tipo');
  const nomeInput = document.getElementById('nome');

  tipoSelect.addEventListener('change', () => {
    const tipo = tipoSelect.value;

    if(tipo === 'trilha') nomeInput.placeholder = "Nome da trilha";
    if(tipo === 'cachoeira') nomeInput.placeholder = "Nome da cachoeira";
    if(tipo === 'evento') nomeInput.placeholder = "Nome do evento";

    carregar();
  });
});


</script>

</body>
</html>
