<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
<link rel="stylesheet" href="css/home.css">
</head>
<body>

<nav class="navbar bg-danger text-white p-3 justify-content-center">
  Eventos
</nav>

<div class="container mt-3">
  <div class="row" id="lista"></div>
</div>

<div id="menu"></div>




<script>
async function atualizarContador() {
  const email = localStorage.getItem("email");
  if(!email) return;

  const res = await fetch(`${API}/minhas-inscricoes/${email}`);
  if(!res.ok) return;

  const inscricoes = await res.json();
  let qtd = inscricoes.length;

  // Máximo 9+
  document.getElementById("contador").innerText = qtd > 9 ? "9+" : qtd;
}


const tipo = localStorage.getItem('tipo');

if(!tipo){
  alert('Faça login primeiro');
  window.location.href='index.html';
}


// =====================
// 🔄 BUSCAR DO BACKEND
// =====================
async function carregar(){
  try {
    const resp = await fetch('/itens?tipo=evento');

    if(!resp.ok){
      throw new Error("Erro ao buscar cachoeira");
    }

    const trilhas = await resp.json();

    const lista = document.getElementById('lista');
    lista.innerHTML='';

    if(!trilhas || trilhas.length === 0){
      lista.innerHTML = `
        <div class="text-center mt-5">
          <h4> 🎉 Nenhum Evento Cadastrado </h4>
          <p>Peça para o admin adicionar um evento</p>
        </div>
      `;
      return;
    }

    trilhas.forEach(t => {
      lista.innerHTML += `
      <div class="col-12 col-md-4 mb-3 fade-in">
        <div class="card shadow-sm">
          <img src="${t.img || 'https://via.placeholder.com/300'}"
               style="height:300px; object-fit:cover;">
          
          <div class="card-body">
            <h5>${t.nome}</h5>
            <p>${t.descricao || 'Sem descrição'}</p>

            <button class="btn btn-success w-100"
              onclick="verDetalhes('${t._id}')">
              Inscrever-se
            </button>
          </div>
        </div>
      </div>`;
    });

  } catch (err) {
    console.error(err);
    alert("Erro ao carregar cachoeiras");
  }
}


// =====================
// 🔁 REDIRECIONAMENTO
// =====================
function verDetalhes(id) {
  window.location.href = `detalhes.html?id=${id}&tipo=evento`;
}

fetch('menu.html')
  .then(res => res.text())
  .then(data => {
    document.getElementById('menu').innerHTML = data;
  });

function irPara(pagina){
  window.location.href = pagina;
}

// INIT
carregar();
</script>

</body>
</html>
