<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>Detalhes da Trilha</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="css/home.css">
  <link rel="stylesheet" href="css/detalhes.css">
  <!-- Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

  <!-- jQuery -->
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

  <!-- Datepicker -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-datepicker/1.9.0/css/bootstrap-datepicker.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-datepicker/1.9.0/js/bootstrap-datepicker.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-datepicker/1.9.0/locales/bootstrap-datepicker.pt-BR.min.js"></script>
</head>

<body class="bg-light">

  <!-- NAVBAR -->
  <nav class="navbar bg-success text-white justify-content-center">
    <span class="navbar-brand text-white">🌿 Detalhes da Trilha</span>
  </nav>

  <!-- MENU -->
  <div id="menu"></div>

  <!-- CONTEÚDO -->
  <div class="container py-3">
    <div class="card shadow-sm rounded-4">

      <img id="img" class="card-img-top" style="height:200px; object-fit:cover;">

      <div class="card-body">
        <h4 id="nome"></h4>
        <p id="descricao" class="text-muted"></p>

        <hr>

        <!-- DATA -->
        <h5 class="mt-3">📅 Escolha uma data</h5>
        <input type="text" id="datepicker" class="form-control mb-3">

        <!-- HORÁRIO -->
        <h5>⏰ Horários disponíveis</h5>
        <div id="horarios" class="d-flex flex-wrap gap-2 mb-4"></div>

        <!-- BOTÃO -->
        <button class="btn btn-success w-100 py-2" onclick="inscrever()">
          Confirmar Inscrição
        </button>
      </div>

    </div>
  </div>

  <script>
    const API = "http://localhost:3000";

    const params = new URLSearchParams(window.location.search);
    const id = params.get("id");
    const tipo = params.get("tipo");
    const categoria = params.get("categoria");

    let trilhaAtual;
    let dataSelecionada = null;
    let horaSelecionada = null;

    if (categoria === "cachoeira") {
      document.body.style.background = "#e0f7fa";
    }

    // =====================
    // MENU
    // =====================
    fetch('menu.html')
      .then(res => res.text())
      .then(data => {
        document.getElementById('menu').innerHTML = data;
      });

    function irPara(pagina) {
      window.location.href = pagina;
    }

    // =====================
    // CARREGAR DADOS
    // =====================
    async function carregar() {
      try {
        const res = await fetch(`${API}/itens/${id}`);

        if (!res.ok) {
          throw new Error("Item não encontrado");
        }

        const item = await res.json();
        trilhaAtual = item;

        document.getElementById("nome").innerText = item.nome;
        document.getElementById("descricao").innerText = item.descricao || "Sem descrição";
        document.getElementById("img").src = item.img || "https://via.placeholder.com/400";

        const titulo = document.querySelector(".navbar-brand");

        if (tipo === "trilha") {
          titulo.innerText = categoria === "cachoeira" ? "💧 Cachoeira" : "🌿 Detalhes da Trilha";
        } else {
          titulo.innerText = "🎉 Detalhes do Evento";
        }

        mostrarDatas(item.datas);

      } catch (err) {
        console.error(err);
        alert("Erro ao carregar");
      }
    }

    // =====================
    // DATAS
    // =====================
    function mostrarDatas(datas) {
      const diasDisponiveis = datas.map(d => new Date(d).toISOString().split('T')[0]);

      $('#datepicker').datepicker({
        format: "dd/mm/yyyy",
        language: "pt-BR",
        todayHighlight: true,
        autoclose: true,
        beforeShowDay: function(date) {
          const dataStr = date.toISOString().split('T')[0];

          if (diasDisponiveis.includes(dataStr)) {
            return { enabled: true, classes: 'bg-success text-white' };
          }

          return { enabled: false, classes: 'text-muted' };
        }
      }).on('changeDate', function(e) {
        dataSelecionada = e.format(0, "yyyy-mm-dd");

        if (trilhaAtual.horarios) {
          mostrarHorarios(trilhaAtual.horarios);
        }
      });
    }

    // =====================
    // HORÁRIOS
    // =====================
    function mostrarHorarios(horarios) {
      const container = document.getElementById("horarios");
      container.innerHTML = '';

      if (!horarios || horarios.length === 0) {
        container.innerHTML = "<p>Sem horários disponíveis</p>";
        return;
      }

      horarios.forEach(h => {
        const div = document.createElement('div');
        div.className = "box hora";
        div.innerText = h;

        div.onclick = () => {
          document.querySelectorAll('.hora').forEach(el => el.classList.remove('selected'));
          div.classList.add('selected');
          horaSelecionada = h;
        };

        container.appendChild(div);
      });
    }

    // =====================
    // INSCRIÇÃO
    // =====================
    async function inscrever() {
      const email = localStorage.getItem("email");

      if (!email) {
        alert("Faça login novamente");
        return;
      }

      if (!dataSelecionada || !horaSelecionada) {
        alert("Selecione data e horário");
        return;
      }

      try {
        const res = await fetch(`${API}/inscrever`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            email,
            itemId: id,
            tipo,
            data: dataSelecionada,
            hora: horaSelecionada
          })
        });

        if (!res.ok) {
          const erro = await res.json();
          alert(erro.erro || "Erro ao inscrever");
          return;
        }

        alert("🎉 Inscrição realizada!");
        window.location.href = "home.html";

      } catch (err) {
        console.error(err);
        alert("Erro ao inscrever");
      }
    }

    // INIT
    carregar();
  </script>

</body>
</html>
