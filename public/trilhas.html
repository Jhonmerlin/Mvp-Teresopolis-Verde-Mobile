<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
<link rel="stylesheet" href="home.css">
</head>
<body>

<nav class="navbar bg-success text-white px-3 d-flex justify-content-between align-items-center">
  <!-- Título -->
  <span class="navbar-brand text-white">🌿 Trilhas</span>

  <!-- Ícone de perfil com contador -->
  <div class="position-relative" onclick="irPara('perfil.html')" style="cursor:pointer;">
    <i class="bi bi-person-circle text-white" style="font-size:30px;"></i>
    <span id="contador" 
          class="badge bg-danger position-absolute top-0 start-100 translate-middle">
      0
    </span>
  </div>
</nav>

<div id="menu"></div>


<div class="container mt-3">
  <div class="row" id="lista"></div>
</div>






<script>
const tipo = localStorage.getItem('tipo');

if(!tipo){
  alert('Faça login primeiro');
  window.location.href='index.html';
}


// =====================
// 🔄 BUSCAR DO BACKEND
// =====================
async function carregar(){
  try {
    const resp = await fetch('/itens?tipo=trilha');

    if(!resp.ok){
      throw new Error("Erro ao buscar trilhas");
    }

    const trilhas = await resp.json();

    const lista = document.getElementById('lista');
    lista.innerHTML='';

    if(!trilhas || trilhas.length === 0){
      lista.innerHTML = `
        <div class="text-center mt-5">
          <h4>🌿 Nenhuma trilha cadastrada</h4>
          <p>Peça para o admin adicionar uma trilha</p>
        </div>
      `;
      return;
    }

    trilhas.forEach(t => {
      lista.innerHTML += `
    <div class="col-12 col-md-4 mb-3 fade-in">
      <div class="card shadow-sm">
        <img src="${t.img || 'https://via.placeholder.com/300'}"
             style="height:300px; object-fit:cover;">
        
        <div class="card-body">
          <h5>${t.nome}</h5>
          <p>${t.descricao || 'Sem descrição'}</p>

          <button class="btn btn-success w-100"
            onclick="verDetalhes('${t._id}')">
            Ver detalhes
          </button>
        </div>
      </div>
    </div>
  `;
});

  } catch (err) {
    console.error(err);
    alert("Erro ao carregar trilhas");
  }
}


// =====================
// 🔁 REDIRECIONAMENTO
// =====================
function verDetalhes(id) {
  window.location.href = `detalhes.html?id=${id}&tipo=trilha`;
}

fetch('menu.html')
  .then(res => res.text())
  .then(data => {
    document.getElementById('menu').innerHTML = data;
  });

function irPara(pagina){
  window.location.href = pagina;
}

// INIT
carregar();
</script>

</body>
</html>
